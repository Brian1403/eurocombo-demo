<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Categorías - EuroCombo Admin</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="img/logo-euro2.png" rel="icon" type="image/png">
    
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">  
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <!-- PWA / App Móvil -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A2E5B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EuroAdmin">
    <link rel="apple-touch-icon" href="img/logo-euro2.png">

    <style>
        /* VARIABLES EUROCOMBO */
        :root { 
            --euro-blue: #0A2E5B; 
            --combo-green: #176B28; 
            --cart-orange: #E64A19; 
            --light-bg: #F8F9FA; 
        }
        
        body { background-color: var(--light-bg); font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .wrapper { display: flex; width: 100%; height: 100vh; }
        
        /* SIDEBAR IDENTICO A ADMIN.HTML */
        .sidebar { width: 250px; background-color: var(--euro-blue); color: white; display: flex; flex-direction: column; transition: all 0.3s; flex-shrink: 0; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-menu { padding-top: 20px; flex: 1; }
        .menu-title { color: rgba(255, 255, 255, 0.5); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; padding: 10px 20px; font-weight: 700; }
        .sidebar a { padding: 12px 20px; font-size: 1rem; color: rgba(255, 255, 255, 0.8); display: block; text-decoration: none; transition: 0.3s; border-left: 4px solid transparent; }
        .sidebar a:hover { color: white; background-color: rgba(255, 255, 255, 0.05); }
        .sidebar a.active { color: white; background-color: rgba(255, 255, 255, 0.1); border-left: 4px solid var(--cart-orange); font-weight: 500; }
        .sidebar a i { width: 25px; }
        .sidebar-footer { padding: 15px 20px; background-color: rgba(0, 0, 0, 0.2); font-size: 0.85rem; }
        
        /* NAVBAR Y CONTENIDO PRINCIPAL */
        .top-navbar { background-color: var(--euro-blue); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* RESPONSIVE MÓVIL */
        @media (max-width: 768px) { 
            .sidebar { position: absolute; left: -250px; z-index: 1000; height: 100%; } 
            .sidebar.active { left: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.2); } 
        }
        
        /* TARJETAS DE CATEGORÍA */
        .cat-item-admin { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: none; transition: all 0.3s ease; display: flex; align-items: center; overflow: hidden; height: 100px; }
        .cat-item-admin:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .cat-img-box { width: 100px; height: 100%; flex-shrink: 0; background: #eee; }
        .cat-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .cat-info { flex-grow: 1; padding-left: 20px; }
        .cat-actions { padding-right: 15px; display: flex; gap: 8px; }
        
        /* LOADER Y VISTA PREVIA */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        #previewContainer { margin-top: 15px; text-align: center; display: none; }
        #imagePreview { max-width: 100%; height: 180px; object-fit: cover; border-radius: 10px; border: 2px dashed #ccc; padding: 5px; }
        .file-input-wrapper { border: 2px dashed #d1d5db; border-radius: 10px; padding: 10px; text-align: center; background: #f9fafb; transition: 0.3s; }
        .file-input-wrapper:hover { border-color: var(--cart-orange); background: #fff; }
    </style>
</head>

<body>
    <!-- LOADER -->
    <div id="loader">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
        <h5 class="mt-3 font-weight-bold" style="color: var(--euro-blue);">Procesando...</h5>
    </div>

    <div class="wrapper">
        <!-- SIDEBAR -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h4 class="text-white m-0 font-weight-bold"><i class="fas fa-shopping-basket mr-2" style="color: var(--cart-orange);"></i>EuroCombo</h4>
            </div>
            
            <div class="sidebar-menu">
                <div class="menu-title">Principal</div>
                <a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                
                <div class="menu-title mt-3">Gestión</div>
                <a href="productos.html"><i class="fas fa-box"></i> Productos</a>
                <a href="combos.html"><i class="fas fa-layer-group"></i> Combos</a>
                <a href="categorias.html" class="active"><i class="fas fa-tags"></i> Categorías</a>
            </div>

            <!-- PIE DE SIDEBAR -->
            <div class="sidebar-footer">
                <div class="text-white-50 mb-1">Sesión iniciada como:</div>
                <div class="font-weight-bold">Administrador</div>
            </div>
        </nav>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="main-content">
            <!-- TOP NAVBAR -->
            <header class="top-navbar">
                <div class="d-flex align-items-center">
                    <button class="btn btn-sm text-white d-md-none mr-3" id="sidebarToggle">
                        <i class="fas fa-bars fa-lg"></i>
                    </button>
                    <h5 class="m-0 font-weight-bold text-white d-none d-md-block">Gestión de Categorías</h5>
                </div>
                
                <!-- MENÚ DESPLEGABLE DEL ADMIN -->
                <div>
                    <div class="dropdown">
                        <a href="#" class="text-white text-decoration-none dropdown-toggle d-flex align-items-center" data-toggle="dropdown">
                            <i class="fas fa-user-circle fa-lg mr-2"></i> Admin
                        </a>
                        <div class="dropdown-menu dropdown-menu-right shadow border-0 mt-2" style="border-radius: 10px;">
                            <a href="#" class="dropdown-item"><i class="fas fa-cog mr-2"></i> Configuración</a>
                            <div class="dropdown-divider"></div>
                            <a href="#" class="dropdown-item text-danger" id="btnLogout"><i class="fas fa-sign-out-alt mr-2"></i> Cerrar Sesión</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="container-fluid p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                    <div>
                        <h2 class="font-weight-bold mb-1" style="color: var(--euro-blue) !important;">Categorías</h2>
                        <p class="text-muted m-0">Administra las secciones de tu menú.</p>
                    </div>
                    <button class="btn shadow-sm" style="background-color: var(--cart-orange); color: white; font-weight: bold; border-radius: 25px; padding: 10px 20px;" data-toggle="modal" data-target="#modalCategoria" id="btnNuevaCategoria">
                        <i class="fas fa-plus mr-2"></i> Nueva Categoría
                    </button>
                </div>
                
                <!-- CONTENEDOR DE CATEGORÍAS -->
                <div class="row" id="contenedor-categorias"></div>
            </div>
        </div>
    </div>

    <!-- MODAL PARA NUEVA/EDITAR CATEGORÍA -->
    <div class="modal fade" id="modalCategoria" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 15px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-weight-bold" id="modalTitulo" style="color: var(--euro-blue);">Nueva Categoría</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body px-4">
                    <form id="formCategoria">
                        <input type="hidden" id="catId">
                        
                        <div class="form-group">
                            <label class="small font-weight-bold text-muted">NOMBRE DE CATEGORÍA</label>
                            <input type="text" id="catNombre" class="form-control bg-light" style="border-radius: 10px; border: 1px solid #e0e0e0;" placeholder="Ej: Cárnicos">
                        </div>
                        
                        <div class="form-group">
                            <label class="small font-weight-bold text-muted">FOTO DE LA CATEGORÍA</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="catImagen" class="form-control-file" accept="image/*" style="cursor: pointer;">
                            </div>
                            
                            <div id="previewContainer">
                                <img id="imagePreview" src="" alt="Previsualización">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light" style="border-radius: 10px;" data-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn px-4" id="btnGuardar" style="background-color: var(--combo-green); color: white; border-radius: 10px; font-weight: bold;">Guardar Categoría</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script> <!-- bundle incluye Popper para el Dropdown -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // CONFIGURACIÓN SUPABASE (LA MISMA LÓGICA QUE YA FUNCIONA)
        const SUPABASE_URL = 'https://tdpfbkwcszcmthjodapb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8HQtrg95k-Slwnwo-S1LqQ_H5iu1N-X'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const BUCKET_NAME = 'imagenes_categorias'; 

        // -----------------------------------------------------------------
        // GUARDIÁN DE SEGURIDAD: COMPROBAR SI ESTÁ LOGUEADO
        // -----------------------------------------------------------------
        async function verificarSesion() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                // Si no hay sesión válida, lo patea al index.html
                window.location.replace('login.html'); 
            }
        }
        verificarSesion();
        // -----------------------------------------------------------------

        document.addEventListener('DOMContentLoaded', () => {

            // TOGGLE SIDEBAR Y CERRAR AL HACER CLIC FUERA
const sidebar = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebarToggle');

sidebarToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    sidebar.classList.toggle('active');
});

document.addEventListener('click', (e) => {
    if (window.innerWidth <= 768) {
        if (sidebar.classList.contains('active') && !sidebar.contains(e.target)) {
            sidebar.classList.remove('active');
        }
    }
});

            // LIMPIAR FORMULARIO AL CREAR NUEVA
            document.getElementById('btnNuevaCategoria').addEventListener('click', () => {
                document.getElementById('formCategoria').reset();
                document.getElementById('catId').value = '';
                document.getElementById('modalTitulo').innerText = 'Nueva Categoría';
                document.getElementById('previewContainer').style.display = 'none';
                document.getElementById('imagePreview').src = '';
            });

            // VISTA PREVIA IMAGEN
            document.getElementById('catImagen').addEventListener('change', function(e) {
                const archivo = e.target.files[0];
                if (archivo) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('imagePreview').src = e.target.result;
                        document.getElementById('previewContainer').style.display = 'block';
                    }
                    reader.readAsDataURL(archivo);
                } else {
                    document.getElementById('previewContainer').style.display = 'none';
                    document.getElementById('imagePreview').src = '';
                }
            });

            // GUARDAR DATOS Y FOTO
            document.getElementById('btnGuardar').addEventListener('click', async (e) => {
                e.preventDefault();
                
                const id = document.getElementById('catId').value;
                const nombre = document.getElementById('catNombre').value.trim();
                const archivo = document.getElementById('catImagen').files[0];

                if (!nombre) return alert("Escribe el nombre de la categoría.");
                if (!id && !archivo) return alert("Debes seleccionar una foto.");

                document.getElementById('loader').style.display = 'flex';
                let imageUrl = null;

                try {
                    // SUBIR IMAGEN
                    if (archivo) {
                        const fileExt = archivo.name.split('.').pop();
                        const fileName = `${Date.now()}_cat.${fileExt}`;
                        
                        const { data: uploadData, error: upError } = await supabaseClient.storage
                            .from(BUCKET_NAME)
                            .upload(fileName, archivo);

                        if (upError) throw new Error("Fallo al subir imagen: " + upError.message);

                        const { data: urlData } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(fileName);
                        imageUrl = urlData.publicUrl;
                    }

                    // GUARDAR O ACTUALIZAR EN BASE DE DATOS
                    if (id) {
                        const updateData = { nombre };
                        if (imageUrl) updateData.imagen_url = imageUrl; 
                        
                        const { error } = await supabaseClient.from('categorias').update(updateData).eq('id', id);
                        if (error) throw new Error("Error DB: " + error.message);
                    } else {
                        const { error } = await supabaseClient.from('categorias').insert([{ nombre: nombre, imagen_url: imageUrl }]);
                        if (error) throw new Error("Error DB: " + error.message);
                    }

                    $('#modalCategoria').modal('hide');
                    cargarCategorias();

                } catch (err) {
                    console.error("ERROR:", err);
                    alert(err.message);
                } finally {
                    document.getElementById('loader').style.display = 'none';
                }
            });

            // CARGAR Y MOSTRAR CATEGORÍAS
            window.cargarCategorias = async function() {
                const contenedor = document.getElementById('contenedor-categorias');
                contenedor.innerHTML = '<div class="col-12 text-center text-muted py-5"><div class="spinner-border text-primary"></div></div>';

                const { data, error } = await supabaseClient.from('categorias').select('*').order('created_at', { ascending: false });
                
                if (error) {
                    contenedor.innerHTML = '<div class="text-danger text-center">Error al conectar con la base de datos.</div>';
                    return;
                }
                
                contenedor.innerHTML = '';
                if (data.length === 0) {
                    contenedor.innerHTML = `<div class="col-12 text-center py-5"><i class="fas fa-tags" style="font-size: 50px; color: #ddd; margin-bottom: 15px;"></i><h4 class="text-muted">Aún no hay categorías</h4></div>`;
                    return;
                }

                data.forEach(cat => {
                    const imageUrl = cat.imagen_url || 'https://via.placeholder.com/100';
                    const nombreSafe = cat.nombre.replace(/'/g, "\\'");
                    
                    contenedor.innerHTML += `
                        <div class="col-lg-4 col-md-6 mb-4">
                            <div class="cat-item-admin">
                                <div class="cat-img-box"><img src="${imageUrl}" alt="img"></div>
                                <div class="cat-info">
                                    <h6 class="font-weight-bold m-0" style="font-size: 1.05rem;">${cat.nombre}</h6>
                                    <small class="text-muted">Activa</small>
                                </div>
                                <div class="cat-actions">
                                    <button class="btn btn-sm btn-light text-primary shadow-sm" style="border-radius: 8px;" onclick="prepararEditar(${cat.id}, '${nombreSafe}', '${imageUrl}')" title="Editar"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-sm btn-light text-danger shadow-sm" style="border-radius: 8px;" onclick="eliminar(${cat.id})" title="Eliminar"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>`;
                });
            }

            // ELIMINAR CATEGORÍA
            window.eliminar = async function(id) {
                if (confirm("¿Seguro que deseas eliminar esta categoría?")) {
                    document.getElementById('loader').style.display = 'flex';
                    const { error } = await supabaseClient.from('categorias').delete().eq('id', id);
                    document.getElementById('loader').style.display = 'none';
                    if(error) alert("Error: " + error.message);
                    else cargarCategorias();
                }
            }

            // PREPARAR FORMULARIO PARA EDICIÓN
            window.prepararEditar = function(id, nombre, urlActual) {
                document.getElementById('formCategoria').reset();
                document.getElementById('catId').value = id;
                document.getElementById('catNombre').value = nombre;
                document.getElementById('modalTitulo').innerText = 'Editar Categoría';
                
                if(urlActual && urlActual !== 'null') {
                    document.getElementById('imagePreview').src = urlActual;
                    document.getElementById('previewContainer').style.display = 'block';
                }
                $('#modalCategoria').modal('show');
            }

            // Arrancar función inicial
            cargarCategorias();
        });

        // CERRAR SESIÓN
        document.getElementById('btnLogout').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabaseClient.auth.signOut();
            window.location.replace('login.html');
        });
        // REGISTRO DE SERVICE WORKER PARA PWA (INSTALACIÓN EN MÓVIL)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((reg) => {
                    console.log('PWA lista para instalarse.');
                });
            });
        }
    </script>
</body>
</html>
