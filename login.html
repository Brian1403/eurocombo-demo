<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Login - EuroCombo Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="img/logo-euro2.png" rel="icon" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root { --euro-blue: #0A2E5B; --cart-orange: #E64A19; }
        body { 
            background-color: var(--euro-blue); 
            font-family: 'Roboto', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { color: var(--euro-blue); font-weight: 700; }
        .form-control { border-radius: 10px; padding: 20px 15px; background: #f8f9fa; border: 1px solid #eee; }
        .form-control:focus { border-color: var(--cart-orange); box-shadow: none; }
        .btn-login { background-color: var(--cart-orange); color: white; border-radius: 10px; padding: 12px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-login:hover { background-color: #d84417; color: white; transform: translateY(-2px); }
        #errorMsg { display: none; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="fas fa-shopping-basket fa-3x mb-3" style="color: var(--cart-orange);"></i>
        <h2>EuroCombo</h2>
        <p class="text-muted mb-4 small">Panel de Administración</p>

        <div class="alert alert-danger p-2" id="errorMsg">Credenciales incorrectas.</div>

        <form id="loginForm">
            <div class="form-group mb-3 text-left">
                <input type="email" id="email" class="form-control" placeholder="Correo electrónico" required>
            </div>
            <div class="form-group mb-4 text-left">
                <input type="password" id="password" class="form-control" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn btn-login" id="btnSubmit">
                Iniciar Sesión <i class="fas fa-sign-in-alt ml-1"></i>
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://tdpfbkwcszcmthjodapb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8HQtrg95k-Slwnwo-S1LqQ_H5iu1N-X'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Si ya está logueado, mandarlo directo al panel de control (admin.html)
        supabaseClient.auth.getSession().then(({ data }) => {
            if (data.session) window.location.replace('admin.html');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const errorMsg = document.getElementById('errorMsg');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verificando...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            // Autenticación real con Supabase
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.innerText = "Usuario o contraseña incorrectos.";
                errorMsg.style.display = 'block';
                btn.innerHTML = 'Iniciar Sesión <i class="fas fa-sign-in-alt ml-1"></i>';
                btn.disabled = false;
            } else {
                // Éxito! Redirigir al panel
                window.location.replace('admin.html');
            }
        });
    </script>
</body>
</html>
